  <text x="20" y="338" font-family="Arial" font-size="11" fill="#334155">🔑 id (PK)</text>
  <text x="20" y="354" font-family="Arial" font-size="11" fill="#334155">🔗 user_id (FK → users)</text>
  <text x="20" y="370" font-family="Arial" font-size="11" fill="#334155">full_name</text>
  <text x="20" y="386" font-family="Arial" font-size="11" fill="#334155">email</text>
  <text x="20" y="402" font-family="Arial" font-size="11" fill="#334155">university</text>
  <text x="20" y="418" font-family="Arial" font-size="11" fill="#334155">gpa</text>
  <text x="20" y="434" font-family="Arial" font-size="11" fill="#334155">skills</text>
  <text x="20" y="450" font-family="Arial" font-size="11" fill="#334155">cv_path</text>
  <text x="20" y="466" font-family="Arial" font-size="11" fill="#334155">profile_complete</text>

  <!-- companies -->
  <rect x="200" y="290" width="170" height="175" rx="8" fill="white" stroke="#d97706" stroke-width="2"/>
  <rect x="200" y="290" width="170" height="30" rx="8" fill="#d97706"/>
  <text x="285" y="310" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">companies</text>
  <text x="210" y="338" font-family="Arial" font-size="11" fill="#334155">🔑 id (PK)</text>
  <text x="210" y="354" font-family="Arial" font-size="11" fill="#334155">🔗 user_id (FK → users)</text>
  <text x="210" y="370" font-family="Arial" font-size="11" fill="#334155">name</text>
  <text x="210" y="386" font-family="Arial" font-size="11" fill="#334155">industry</text>
  <text x="210" y="402" font-family="Arial" font-size="11" fill="#334155">location</text>
  <text x="210" y="418" font-family="Arial" font-size="11" fill="#334155">website</text>
  <text x="210" y="434" font-family="Arial" font-size="11" fill="#334155">logo_path</text>
  <text x="210" y="450" font-family="Arial" font-size="11" fill="#334155">is_deleted</text>

