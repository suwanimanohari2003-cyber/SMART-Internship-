  <text x="720" y="270" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">interview_sessions</text>
  <text x="630" y="298" font-family="Arial" font-size="11" fill="#334155">🔑 id (PK)</text>
  <text x="630" y="314" font-family="Arial" font-size="11" fill="#334155">🔗 student_id (FK → students)</text>
  <text x="630" y="330" font-family="Arial" font-size="11" fill="#334155">🔗 job_posting_id (FK)</text>
  <text x="630" y="346" font-family="Arial" font-size="11" fill="#334155">total_score</text>
  <text x="630" y="362" font-family="Arial" font-size="11" fill="#334155">passed</text>
  <text x="630" y="378" font-family="Arial" font-size="11" fill="#334155">started_at</text>
  <text x="630" y="394" font-family="Arial" font-size="11" fill="#334155">completed_at</text>

  <!-- interview_answers -->
  <rect x="620" y="450" width="200" height="160" rx="8" fill="white" stroke="#be185d" stroke-width="2"/>
  <rect x="620" y="450" width="200" height="30" rx="8" fill="#be185d"/>
  <text x="720" y="470" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">interview_answers</text>
  <text x="630" y="498" font-family="Arial" font-size="11" fill="#334155">🔑 id (PK)</text>
  <text x="630" y="514" font-family="Arial" font-size="11" fill="#334155">🔗 session_id (FK → sessions)</text>
  <text x="630" y="530" font-family="Arial" font-size="11" fill="#334155">🔗 question_id (FK → questions)</text>
  <text x="630" y="546" font-family="Arial" font-size="11" fill="#334155">answer_text</text>
  <text x="630" y="562" font-family="Arial" font-size="11" fill="#334155">score (0-10)</text>
  <text x="630" y="578" font-family="Arial" font-size="11" fill="#334155">feedback</text>

  <!-- Relationship arrows -->
  <!-- users → user_roles -->
  <line x1="170" y1="140" x2="200" y2="230" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- roles → user_roles -->
  <line x1="275" y1="160" x2="275" y2="185" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- users → students -->
  <line x1="90" y1="220" x2="90" y2="290" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- users → companies -->
  <line x1="170" y1="150" x2="285" y2="290" stroke="#d97706" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- companies → job_postings -->
  <line x1="370" y1="370" x2="400" y2="320" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- students → applications -->
  <line x1="95" y1="490" x2="400" y2="530" stroke="#0891b2" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- job_postings → applications -->
  <line x1="492" y1="420" x2="492" y2="445" stroke="#0891b2" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- job_postings → interview_questions -->
  <line x1="585" y1="250" x2="620" y2="180" stroke="#be185d" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- job_postings → interview_sessions -->
  <line x1="585" y1="310" x2="620" y2="330" stroke="#be185d" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- students → interview_sessions -->
  <line x1="180" y1="400" x2="620" y2="360" stroke="#be185d" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <!-- sessions → answers -->
  <line x1="720" y1="425" x2="720" y2="450" stroke="#be185d" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- questions → answers -->
  <line x1="820" y1="220" x2="820" y2="450" stroke="#be185d" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="860" y="60" width="220" height="140" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="970" y="82" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#334155">Legend</text>
  <text x="875" y="104" font-family="Arial" font-size="11" fill="#334155">🔑 Primary Key</text>
  <text x="875" y="120" font-family="Arial" font-size="11" fill="#334155">🔗 Foreign Key</text>
  <line x1="875" y1="135" x2="905" y2="135" stroke="#64748b" stroke-width="2"/>
  <text x="910" y="139" font-family="Arial" font-size="11" fill="#334155">FK Relationship</text>
  <line x1="875" y1="155" x2="905" y2="155" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="910" y="159" font-family="Arial" font-size="11" fill="#334155">Join / Indirect FK</text>
  <text x="875" y="180" font-family="Arial" font-size="10" fill="#94a3b8">Database: intern_portal</text>
</svg>
