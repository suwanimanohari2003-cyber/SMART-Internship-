<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" width="1100" height="750">
  <rect width="1100" height="750" fill="#f0f4ff"/>
  <text x="550" y="35" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1e3a8a">Smart Internship Portal — ERD (intern_portal)</text>

  <!-- users -->
  <rect x="10" y="60" width="160" height="160" rx="8" fill="white" stroke="#2563eb" stroke-width="2"/>
  <rect x="10" y="60" width="160" height="30" rx="8" fill="#2563eb"/>
  <text x="90" y="80" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">users</text>
  <text x="20" y="108" font-family="Arial" font-size="11" fill="#334155">🔑 id (PK)</text>
  <text x="20" y="124" font-family="Arial" font-size="11" fill="#334155">email</text>
  <text x="20" y="140" font-family="Arial" font-size="11" fill="#334155">username</text>
  <text x="20" y="156" font-family="Arial" font-size="11" fill="#334155">password_hash</text>
  <text x="20" y="172" font-family="Arial" font-size="11" fill="#334155">enabled</text>
  <text x="20" y="188" font-family="Arial" font-size="11" fill="#334155">created_at</text>
  <text x="20" y="204" font-family="Arial" font-size="11" fill="#334155">is_deleted</text>

  <!-- roles -->
  <rect x="200" y="60" width="150" height="100" rx="8" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <rect x="200" y="60" width="150" height="30" rx="8" fill="#7c3aed"/>
  <text x="275" y="80" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">roles</text>
  <text x="210" y="108" font-family="Arial" font-size="11" fill="#334155">🔑 id (PK)</text>
  <text x="210" y="124" font-family="Arial" font-size="11" fill="#334155">name (STUDENT/COMPANY/ADMIN)</text>

  <!-- user_roles -->
  <rect x="200" y="185" width="150" height="85" rx="8" fill="white" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5,3"/>
