  <text x="492" y="220" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">job_postings</text>
  <text x="410" y="248" font-family="Arial" font-size="11" fill="#334155">🔑 id (PK)</text>
  <text x="410" y="264" font-family="Arial" font-size="11" fill="#334155">🔗 company_id (FK → companies)</text>
  <text x="410" y="280" font-family="Arial" font-size="11" fill="#334155">title</text>
  <text x="410" y="296" font-family="Arial" font-size="11" fill="#334155">description</text>
  <text x="410" y="312" font-family="Arial" font-size="11" fill="#334155">required_skills</text>
  <text x="410" y="328" font-family="Arial" font-size="11" fill="#334155">min_gpa</text>
  <text x="410" y="344" font-family="Arial" font-size="11" fill="#334155">deadline</text>
  <text x="410" y="360" font-family="Arial" font-size="11" fill="#334155">status (OPEN/CLOSED)</text>
  <text x="410" y="376" font-family="Arial" font-size="11" fill="#334155">created_at</text>
  <text x="410" y="392" font-family="Arial" font-size="11" fill="#334155">is_deleted</text>

