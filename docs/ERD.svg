  <text x="210" y="232" font-family="Arial" font-size="11" fill="#334155">🔗 user_id (FK → users)</text>
  <text x="210" y="248" font-family="Arial" font-size="11" fill="#334155">🔗 role_id (FK → roles)</text>

  <!-- students -->
  <rect x="10" y="290" width="170" height="200" rx="8" fill="white" stroke="#059669" stroke-width="2"/>
  <rect x="10" y="290" width="170" height="30" rx="8" fill="#059669"/>
