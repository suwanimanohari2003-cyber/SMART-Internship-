  <text x="410" y="509" font-family="Arial" font-size="11" fill="#334155">🔗 student_id (FK → students)</text>
  <text x="410" y="525" font-family="Arial" font-size="11" fill="#334155">🔗 job_posting_id (FK)</text>
  <text x="410" y="541" font-family="Arial" font-size="11" fill="#334155">status</text>
  <text x="410" y="557" font-family="Arial" font-size="11" fill="#334155">applied_at</text>
  <text x="410" y="573" font-family="Arial" font-size="11" fill="#334155">updated_at</text>
  <text x="410" y="589" font-family="Arial" font-size="11" fill="#334155">status_changed_by</text>

