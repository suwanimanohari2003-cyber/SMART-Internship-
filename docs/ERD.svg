  <text x="630" y="108" font-family="Arial" font-size="11" fill="#334155">🔑 id (PK)</text>
  <text x="630" y="124" font-family="Arial" font-size="11" fill="#334155">🔗 job_posting_id (FK)</text>
  <text x="630" y="140" font-family="Arial" font-size="11" fill="#334155">question_text</text>
  <text x="630" y="156" font-family="Arial" font-size="11" fill="#334155">category</text>
  <text x="630" y="172" font-family="Arial" font-size="11" fill="#334155">difficulty</text>
  <text x="630" y="188" font-family="Arial" font-size="11" fill="#334155">sample_answer</text>

