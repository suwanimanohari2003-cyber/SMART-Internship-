# ─────────────────────────────────────────────────────────────────────────────
# APPLICATION PROPERTIES — Smart Internship Placement Portal
# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT: Sensitive values (DB password, Gmail password) are read from
# environment variables. Set them in:
#   - Local: set DB_PASSWORD=xxx  or use IDE run config environment variables
#   - Railway: Dashboard → Variables tab → add each key
# ─────────────────────────────────────────────────────────────────────────────
spring.application.name=internship

# ─────────────────────────────────────────────────────────────────────────────
# DATABASE CONNECTION
# Set DB_URL, DB_USERNAME, DB_PASSWORD as environment variables
# Railway automatically provides JDBC_DATABASE_URL — check Railway docs
# ─────────────────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/intern_portal?serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool settings (important for cloud environments)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.cache=true

# ─────────────────────────────────────────────────────────────────────────────
# FILE UPLOAD (CV uploads)
# On Railway, use /tmp which is always writable
# ─────────────────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=${UPLOAD_DIR:uploads/cvs}

# ─────────────────────────────────────────────────────────────────────────────
# EMAIL CONFIGURATION (Gmail SMTP)
# Set MAIL_USERNAME and MAIL_PASSWORD as environment variables
# MAIL_PASSWORD must be a 16-char Gmail App Password, not regular password
# (Google Account → Security → 2-Step Verification → App Passwords)
# ─────────────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:interngo26@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Async thread pool (async email)
spring.task.execution.pool.core-size=5

# CV Ranking threshold (configurable auto-shortlist %)
cv.filter.threshold=60

# Springdoc / Swagger
springdoc.packagesToScan=com.example.internship.controller

# Server port (Railway injects PORT env var)
server.port=${PORT:8080}
