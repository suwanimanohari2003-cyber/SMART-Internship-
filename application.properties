spring.application.name=internship

# ─────────────────────────────────────────────────────────────────────────────
# DATABASE CONNECTION
# Replace YOUR_DB_PASSWORD with your actual MySQL password before running.
# ─────────────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3307/intern_portal?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Amandi@2004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# Thymeleaf
spring.thymeleaf.cache=false

# File Upload Limits (M3 — CV Upload)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=uploads/cvs

# ─────────────────────────────────────────────────────────────────────────────
# EMAIL CONFIGURATION (M9 — Google SMTP)
# Replace YOUR_GMAIL_ADDRESS and YOUR_GMAIL_APP_PASSWORD with real values.
# To generate an app password: Google Account → Security → App Passwords
# ─────────────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=interngo26@gmail.com
spring.mail.password=Interngo@123
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Async thread pool (M9 — async email)
spring.task.execution.pool.core-size=5

# CV Ranking threshold (M6 — configurable auto-shortlist %)
cv.filter.threshold=60

# Springdoc / Swagger
springdoc.packagesToScan=com.example.internship.controller
