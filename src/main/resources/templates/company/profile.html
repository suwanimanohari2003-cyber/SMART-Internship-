<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Profile - TalentHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; overflow-x: hidden; }
        .sidebar { width: 250px; background-color: #0f172a; color: #9ca3af; position: fixed; top: 0; bottom: 0; left: 0; display: flex; flex-direction: column; z-index: 1000; }
        .sidebar-header { padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1f2937; }
        .logo-box { background-color: #2563eb; color: white; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; }
        .sidebar-nav { padding: 20px 0; flex-grow: 1; }
        .nav-item { padding: 12px 20px; display: flex; align-items: center; gap: 15px; text-decoration: none; color: #9ca3af; transition: all 0.3s ease; }
        .nav-item:hover, .nav-item.active { background-color: #1e40af; color: white; border-right: 4px solid #3b82f6; }
        .sidebar-footer { padding: 20px; border-top: 1px solid #1f2937; }
        .logout-btn { color: #ef4444; display: flex; align-items: center; gap: 10px; background: none; border: none; padding: 0; font-size: 1rem; cursor: pointer; }
        .main-content { margin-left: 250px; min-height: 100vh; padding-bottom: 50px; }
        .topbar { background-color: white; height: 70px; padding: 0 30px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; }
        .page-container { padding: 40px; max-width: 700px; margin: 0 auto; }
        .form-card { background: white; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .form-card-header { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); padding: 28px 30px; color: white; }
        .form-card-body { padding: 30px; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">
        <div class="logo-box" th:text="${company != null ? #strings.substring(company.name,0,1) : 'C'}">C</div>
        <div>
            <h5 class="m-0 text-white" style="font-size:1.1rem; font-weight:600;" th:text="${company != null ? company.name : 'Company'}">Company</h5>
            <span style="font-size:0.75rem; color:#64748b;">Recruitment</span>
        </div>
    </div>
    <div class="sidebar-nav">
        <a th:href="@{/company/dashboard}" class="nav-item"><i class="fa-solid fa-border-all"></i> Dashboard</a>
        <a th:href="@{/company/jobs/post}" class="nav-item"><i class="fa-solid fa-briefcase"></i> Post Job</a>
        <a th:href="@{/company/jobs/manage}" class="nav-item"><i class="fa-solid fa-list-check"></i> Manage Jobs</a>
        <a th:href="@{/company/applicants}" class="nav-item"><i class="fa-solid fa-users"></i> Applicants</a>
        <a th:href="@{/company/settings}" class="nav-item active"><i class="fa-solid fa-gear"></i> Settings</a>
    </div>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
        </form>
    </div>
</div>

<div class="main-content">
    <div class="topbar">
        <div class="fw-bold text-dark">Company Profile</div>
    </div>
    <div class="page-container">
        <div class="form-card">
            <div class="form-card-header">
                <h4 class="fw-bold mb-1">Build Your Company Profile</h4>
                <div class="opacity-75 small">Keep your information up to date to attract the best candidates.</div>
            </div>
            <div class="form-card-body">
                <div th:if="${param.success}" class="alert alert-success fw-semibold mb-4">
                    <i class="fa-solid fa-circle-check me-2"></i> Profile updated successfully!
                </div>
                <form th:action="@{/company/settings/update}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Company Name</label>
                        <input type="text" class="form-control" name="name" th:value="${company != null ? company.name : ''}" placeholder="e.g., Virtusa Corp" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Industry</label>
                            <input type="text" class="form-control" name="industry" th:value="${company != null ? company.industry : ''}" placeholder="e.g., Software Development">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Location</label>
                            <input type="text" class="form-control" name="location" th:value="${company != null ? company.location : ''}" placeholder="e.g., Colombo, Sri Lanka">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Website URL</label>
                        <input type="text" class="form-control" name="website" th:value="${company != null ? company.website : ''}" placeholder="https://www.example.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Company Description</label>
                        <textarea class="form-control" name="description" rows="4" placeholder="Briefly describe what your company does..." th:text="${company != null ? company.description : ''}"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">
                        <i class="fa-solid fa-floppy-disk me-2"></i> Save Profile
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
