<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>API Documentation - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; overflow: hidden; }
        .sidebar { width: 250px; background-color: #0f172a; color: #9ca3af; position: fixed; top: 0; bottom: 0; left: 0; display: flex; flex-direction: column; z-index: 1000; }
        .sidebar-header { padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1f2937; }
        .logo-box { background-color: #ef4444; color: white; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
        .sidebar-nav { padding: 20px 0; flex-grow: 1; }
        .nav-item { padding: 12px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; text-decoration: none; color: #9ca3af; transition: all 0.3s ease; }
        .nav-item:hover, .nav-item.active { background-color: #1e40af; color: white; border-right: 4px solid #ef4444; }
        .main-content { margin-left: 250px; height: 100vh; display: flex; flex-direction: column; }
        .topbar { background-color: white; height: 70px; padding: 0 30px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">
        <div class="logo-box">AD</div>
        <h5 class="m-0 text-white fw-bold">System Admin</h5>
    </div>
    <div class="sidebar-nav">
        <div style="padding: 0 20px 10px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Admin Menu</div>
        <a th:href="@{/admin/dashboard}" class="nav-item active"><i class="fa-solid fa-gauge"></i> Dashboard</a>
        <a th:href="@{/admin/users}" class="nav-item"><i class="fa-solid fa-users-gear"></i> Manage Users</a>
        <a th:href="@{/admin/students}" class="nav-item"><i class="fa-solid fa-user-graduate"></i> Manage Students</a>
        <a th:href="@{/admin/companies}" class="nav-item"><i class="fa-solid fa-building"></i> Manage Companies</a>
        <a th:href="@{/admin/jobs}" class="nav-item"><i class="fa-solid fa-briefcase"></i> Job Postings</a>
        <a th:href="@{/admin/reports}" class="nav-item"><i class="fa-solid fa-chart-pie"></i> System Reports</a>
        <a th:href="@{/admin/settings}" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
        <a th:href="@{/admin/api-docs}" class="nav-item"><i class="fa-solid fa-book"></i> API Docs</a>
    </div>
</div>
<div class="main-content">
    <div class="topbar">
        <div class="fw-bold">Intern Portal API Documentation</div>
    </div>
    <iframe src="/swagger-ui/index.html"></iframe>
</div>
</body>
</html>
