<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Interview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 30px 20px; }
        .interview-wrapper { max-width: 720px; width: 100%; }
        .progress-bar-outer { background: #e2e8f0; border-radius: 10px; height: 8px; margin-bottom: 20px; }
        .progress-bar-inner { background: linear-gradient(90deg, #2563eb, #7c3aed); border-radius: 10px; height: 8px; transition: width 0.5s; }
        .interview-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.09); }
        .card-header-bar { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); padding: 22px 28px; display: flex; align-items: center; justify-content: space-between; }
        .timer-badge { background: rgba(239,68,68,0.9); color: white; padding: 8px 18px; border-radius: 24px; font-size: 1.05rem; font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .card-body-area { padding: 32px 28px; }
        .category-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
        .cat-technical { background: #eff6ff; color: #1d4ed8; }
        .cat-hr { background: #f0fdf4; color: #15803d; }
        .cat-aptitude { background: #fef3c7; color: #92400e; }
        textarea.form-control { resize: none; border-radius: 10px; border: 1.5px solid #e2e8f0; padding: 16px; font-size: 0.95rem; line-height: 1.6; }
        textarea.form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .submit-btn { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: white; border: none; border-radius: 10px; padding: 14px 28px; font-weight: 700; font-size: 1rem; width: 100%; transition: transform 0.1s; }
        .submit-btn:hover { transform: translateY(-1px); }
        .q-info { font-size: 0.85rem; color: #94a3b8; }
    </style>
</head>
<body>
<div class="interview-wrapper">
    <!-- No questions configured for this job yet -->
    <div th:if="${noQuestions}" class="interview-card text-center p-5">
        <i class="fa-solid fa-circle-info fa-3x text-secondary mb-3 d-block"></i>
        <h4 class="fw-bold text-dark mb-2">No Interview Questions Yet</h4>
        <p class="text-muted mb-4" th:if="${interviewSession != null}">
            The company hasn't added any interview questions for
            <strong th:text="${interviewSession.jobPosting.title}">this role</strong> yet. Please check back later.
        </p>
        <a th:href="@{/student/applications}" class="btn btn-primary px-4">Back to Applications</a>
    </div>

    <div th:unless="${noQuestions}">
    <!-- Progress -->
    <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="fw-semibold text-dark">Mock Interview</span>
        <span class="q-info">Question <span th:text="${currentIndex + 1}">1</span> of <span th:text="${totalQuestions}">5</span></span>
    </div>
    <div class="progress-bar-outer">
        <div class="progress-bar-inner" th:style="'width: ' + ${(currentIndex * 100 / totalQuestions)} + '%'"></div>
    </div>

    <div class="interview-card">
        <div class="card-header-bar">
            <div class="text-white">
                <div class="fw-bold" th:text="${interviewSession.jobPosting.title}">Job Title</div>
                <div class="opacity-75 small" th:text="${interviewSession.jobPosting.company.name}">Company</div>
            </div>
            <div class="timer-badge" id="timerBadge">
                <i class="fa-solid fa-stopwatch"></i>
                <span id="timer">03:00</span>
            </div>
        </div>

        <div class="card-body-area">
            <div class="category-badge"
                 th:classappend="${question.category == 'HR' ? 'cat-hr' : (question.category == 'APTITUDE' ? 'cat-aptitude' : 'cat-technical')}"
                 th:text="${question.category}">TECHNICAL</div>

            <h4 class="fw-bold mb-4 text-dark" th:text="${question.questionText}">Question text goes here?</h4>

            <form id="answerForm"
                  th:action="@{'/student/interviews/' + ${interviewSession.id} + '/answer/' + ${currentIndex}}"
                  method="post">
                <input type="hidden" name="questionId" th:value="${question.id}" />
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="mb-4">
                    <label class="form-label text-muted fw-semibold small">Your Answer</label>
                    <textarea name="answerText" class="form-control" rows="6"
                              placeholder="Type your answer here. Be as specific and detailed as possible..."
                              required autofocus></textarea>
                    <div class="text-muted small mt-1"><i class="fa-solid fa-circle-info me-1"></i> The timer will auto-submit when it reaches 0:00.</div>
                </div>

                <button type="submit" class="submit-btn">
                    <span th:if="${currentIndex + 1 < totalQuestions}">
                        Submit &amp; Next Question <i class="fa-solid fa-arrow-right ms-2"></i>
                    </span>
                    <span th:if="${currentIndex + 1 >= totalQuestions}">
                        Submit Final Answer <i class="fa-solid fa-flag-checkered ms-2"></i>
                    </span>
                </button>
            </form>
        </div>
    </div>
    </div>
</div>

<script th:if="${noQuestions == null or !noQuestions}">
    let timeLeft = 180;
    const timerEl = document.getElementById('timer');
    const timerBadge = document.getElementById('timerBadge');
    const form = document.getElementById('answerForm');

    const interval = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        timerEl.innerText = '0' + m + ':' + (s < 10 ? '0' : '') + s;

        if (timeLeft <= 30) {
            timerBadge.style.animation = 'pulse 1s infinite';
        }
        if (timeLeft <= 0) {
            clearInterval(interval);
            form.submit();
        }
    }, 1000);
</script>
<style>
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
</style>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
