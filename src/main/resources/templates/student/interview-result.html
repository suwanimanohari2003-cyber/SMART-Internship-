<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f4ff; min-height: 100vh; padding: 40px 20px; }
        .result-wrapper { max-width: 900px; margin: 0 auto; }
        .result-banner { border-radius: 16px; padding: 40px; text-align: center; color: white; margin-bottom: 24px; }
        .result-pass { background: linear-gradient(135deg, #065f46 0%, #10b981 100%); }
        .result-fail { background: linear-gradient(135deg, #7f1d1d 0%, #ef4444 100%); }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 4px solid rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; flex-direction: column; margin: 0 auto 16px; }
        .detail-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 20px; }
        .detail-card-header { padding: 16px 24px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; }
        .answer-row { padding: 20px 24px; border-bottom: 1px solid #f1f5f9; }
        .answer-row:last-child { border-bottom: none; }
        .score-pill { padding: 3px 12px; border-radius: 20px; font-weight: 700; font-size: 0.85rem; }
        .score-good { background: #d1fae5; color: #065f46; }
        .score-mid { background: #fef3c7; color: #92400e; }
        .score-low { background: #fee2e2; color: #991b1b; }
        .category-tag { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; background: #f1f5f9; color: #64748b; }
    </style>
</head>
<body>
<div class="result-wrapper">
    <!-- Banner -->
    <div class="result-banner"
         th:classappend="${interviewSession.passed ? 'result-pass' : 'result-fail'}">
        <div class="score-circle">
            <span style="font-size: 2rem; font-weight: 800;" th:text="${interviewSession.totalScore} + '%'">0%</span>
            <span style="font-size: 0.8rem; opacity: 0.8;">Score</span>
        </div>
        <h2 class="fw-bold mb-1" th:text="${interviewSession.passed ? '🎉 Congratulations! You Passed.' : '📚 Keep Practicing! You Failed.'}">Result</h2>
        <p class="opacity-75 mb-0" th:text="'Interview for: ' + (${interviewSession.jobPosting != null ? interviewSession.jobPosting.title : 'N/A'})">Job Title</p>
        <small class="opacity-60" th:text="${interviewSession.jobPosting != null and interviewSession.jobPosting.company != null ? interviewSession.jobPosting.company.name : ''}">Company</small>
    </div>

    <!-- Summary Stats -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="bg-white rounded-3 border p-4 text-center">
                <div class="fw-bold fs-3 text-primary" th:text="${interviewSession.totalScore} + '%'">0%</div>
                <div class="text-muted small">Total Score</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="bg-white rounded-3 border p-4 text-center">
                <div class="fw-bold fs-3" th:text="${#lists.size(answers)}">0</div>
                <div class="text-muted small">Questions Answered</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="bg-white rounded-3 border p-4 text-center">
                <div class="fw-bold fs-3"
                     th:classappend="${interviewSession.passed ? 'text-success' : 'text-danger'}"
                     th:text="${interviewSession.passed ? 'PASSED' : 'FAILED'}">STATUS</div>
                <div class="text-muted small">Pass mark: 60%</div>
            </div>
        </div>
    </div>

    <!-- Detailed Breakdown -->
    <div class="detail-card">
        <div class="detail-card-header"><i class="fa-solid fa-list me-2"></i>Detailed Answer Breakdown</div>
        <div th:each="ans : ${answers}" class="answer-row">
            <div class="d-flex align-items-start justify-content-between gap-3 mb-3">
                <div class="flex-grow-1">
                    <span class="category-tag me-2" th:text="${ans.question.category}">CATEGORY</span>
                    <strong class="text-dark" th:text="${ans.question.questionText}">Question</strong>
                </div>
                <span class="score-pill flex-shrink-0"
                      th:classappend="${ans.score >= 7 ? 'score-good' : (ans.score >= 4 ? 'score-mid' : 'score-low')}"
                      th:text="${ans.score} + '/10'">Score</span>
            </div>
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="text-muted small fw-semibold mb-1">Your Answer:</div>
                    <div class="bg-light rounded-2 p-3 text-secondary small" th:text="${ans.answerText}">Answer</div>
                </div>
                <div class="col-md-6">
                    <div class="text-muted small fw-semibold mb-1">AI Feedback:</div>
                    <div class="bg-light rounded-2 p-3 text-secondary small fst-italic" th:text="${ans.feedback}">Feedback</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Action buttons -->
    <div class="d-flex gap-3 justify-content-center mt-4">
        <a th:href="@{/student/dashboard}" class="btn btn-primary px-5 fw-semibold">
            <i class="fa-solid fa-house me-2"></i> Back to Dashboard
        </a>
        <a th:href="@{/student/applications}" class="btn btn-outline-secondary px-5 fw-semibold">
            <i class="fa-regular fa-paper-plane me-2"></i> My Applications
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
