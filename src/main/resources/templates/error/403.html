<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 403</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f4ff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .error-card { background: white; border-radius: 20px; padding: 60px 50px; text-align: center; max-width: 500px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .error-code { font-size: 6rem; font-weight: 800; line-height: 1; background: linear-gradient(135deg, #1e3a8a, #2563eb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .error-icon { font-size: 2.5rem; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="error-card">
    <div class="error-icon">
        <i class="fa-solid fa-lock text-warning"></i>
    </div>
    <div class="error-code">403</div>
    <h3 class="fw-bold text-dark mb-2">Access Denied</h3>
    <p class="text-muted mb-4">You don't have permission to view this page. Please log in with the appropriate account.</p>
    <div class="d-flex gap-3 justify-content-center">
        <a href="/" class="btn btn-primary px-4 fw-semibold"><i class="fa-solid fa-house me-2"></i> Go Home</a>
        <a href="javascript:history.back()" class="btn btn-outline-secondary px-4 fw-semibold"><i class="fa-solid fa-arrow-left me-2"></i> Go Back</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
