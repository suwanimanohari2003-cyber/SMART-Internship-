<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="pagination">
<body>
<div th:fragment="pagination(currentPage, totalPages, baseUrl)">
    <nav aria-label="Page navigation" class="my-4">
        <div class="d-flex align-items-center justify-content-between">
            <div class="text-muted small">
                Page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPages}">1</span>
            </div>
            <ul class="pagination mb-0">
                <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                    <a class="page-link"
                       th:href="${baseUrl + '?page=' + (currentPage - 1)}"
                       aria-label="Previous">
                        <i class="fa-solid fa-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage ? 'active' : ''}">
                    <a class="page-link" th:href="${baseUrl + '?page=' + i}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                    <a class="page-link"
                       th:href="${baseUrl + '?page=' + (currentPage + 1)}"
                       aria-label="Next">
                        <i class="fa-solid fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </div>
    </nav>
</div>
</body>
</html>
